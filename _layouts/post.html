---
layout: default
---
<article class="post">
  {% if page.categories.first %}
  <div class="post-eyebrow">{{ page.categories.first | replace: '-', ' ' }}</div>
  {% endif %}
  <h1>{{ page.title }}</h1>
  <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.tags.size > 0 %} &middot; {{ page.tags | join: ", " }}{% endif %}</div>
  <div class="post-body">
    {{ content }}
  </div>
</article>
