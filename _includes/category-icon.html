{% assign pp_icon_name = include.name | default: "" | downcase %}
{% assign pp_icon_size = include.size | default: 28 %}
<svg class="pp-icon {{ include.class }}" width="{{ pp_icon_size }}" height="{{ pp_icon_size }}" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
{% case pp_icon_name %}
{% when 'pickleball' %}
  <ellipse cx="18" cy="17" rx="12" ry="14"/>
  <line x1="18" y1="31" x2="18" y2="43"/>
  <circle cx="38" cy="30" r="6"/>
  <circle cx="35.5" cy="27" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="40" cy="27.5" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="34.5" cy="32" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="41" cy="32" r="0.8" fill="currentColor" stroke="none"/>
  <circle cx="38" cy="34.5" r="0.8" fill="currentColor" stroke="none"/>
{% when 'tennis' %}
  <ellipse cx="20" cy="16" rx="12" ry="14"/>
  <line x1="20" y1="4" x2="20" y2="28"/>
  <line x1="10" y1="10" x2="30" y2="10"/>
  <line x1="9" y1="16" x2="31" y2="16"/>
  <line x1="10" y1="22" x2="30" y2="22"/>
  <path d="M15 29 L20 33 L25 29"/>
  <line x1="20" y1="33" x2="20" y2="43"/>
{% when 'soccer' %}
  <circle cx="24" cy="24" r="18"/>
  <path d="M24 15 L31 20 L28 28 L20 28 L17 20 Z"/>
  <path d="M24 15 L24 8 M31 20 L38 16 M28 28 L33 35 M20 28 L15 35 M17 20 L10 16"/>
{% when 'cycling' %}
  <circle cx="12" cy="34" r="9"/>
  <circle cx="36" cy="34" r="9"/>
  <path d="M12 34 L21 15 L34 15 M21 15 L28 34 M12 34 L28 34 L36 34 M28 34 L34 15"/>
  <circle cx="21" cy="15" r="1.4" fill="currentColor" stroke="none"/>
  <path d="M31 12 L37 12 M34 12 L36 15"/>
{% when 'camping tents' %}
  <path d="M6 40 L24 9 L42 40 Z"/>
  <path d="M18 40 L24 27 L30 40"/>
  <line x1="3" y1="40" x2="45" y2="40"/>
  <line x1="24" y1="9" x2="24" y2="17"/>
{% when 'coffee makers' %}
  <path d="M10 18 h21 v15 a10.5 10.5 0 0 1 -21 0 Z"/>
  <path d="M31 22 a6 6 0 0 1 0 11"/>
  <line x1="7" y1="41" x2="34" y2="41"/>
  <path d="M16 12 q3 -4 0 -7 M23 12 q3 -4 0 -7"/>
{% else %}
  <path d="M25 6 L42 23 L25 40 L14 40 L6 32 L6 21 Z"/>
  <circle cx="16" cy="16" r="3"/>
{% endcase %}
</svg>
