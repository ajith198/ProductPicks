<div class="guide-search" id="pp-guide-search">
  <div class="guide-search-row">
    <input type="text" id="pp-search-text" class="guide-search-input" placeholder="Search guides (e.g. &ldquo;paddle&rdquo;, &ldquo;tent&rdquo;)&hellip;" aria-label="Search guides">
  </div>
  <div class="guide-search-row guide-search-filters">
    <label class="guide-search-field">
      <span>Category</span>
      <select id="pp-filter-category" aria-label="Filter by category">
        <option value="">All categories</option>
        {% assign categories = site.posts | map: "category" | compact | uniq | sort %}
        {% for c in categories %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
      </select>
    </label>
    <label class="guide-search-field">
      <span>Type</span>
      <select id="pp-filter-subcategory" aria-label="Filter by specific category">
        <option value="">All types</option>
        {% assign subcategories = site.posts | map: "subcategory" | compact | uniq | sort %}
        {% for s in subcategories %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
      </select>
    </label>
    <label class="guide-search-field">
      <span>Year</span>
      <select id="pp-filter-year" aria-label="Filter by year published">
        <option value="">All years</option>
        {% assign seen_years = "" | split: "," %}
        {% for post in site.posts %}
          {% assign y = post.date | date: "%Y" %}
          {% unless seen_years contains y %}
            {% assign seen_years = seen_years | push: y %}
            <option value="{{ y }}">{{ y }}</option>
          {% endunless %}
        {% endfor %}
      </select>
    </label>
    <button type="button" id="pp-filter-reset" class="guide-search-reset">Reset</button>
  </div>
  <div class="guide-search-status" id="pp-search-status" role="status"></div>
</div>
<script>
  (function () {
    var textInput = document.getElementById('pp-search-text');
    var categorySelect = document.getElementById('pp-filter-category');
    var subcategorySelect = document.getElementById('pp-filter-subcategory');
    var yearSelect = document.getElementById('pp-filter-year');
    var resetBtn = document.getElementById('pp-filter-reset');
    var status = document.getElementById('pp-search-status');
    var entries = Array.prototype.slice.call(document.querySelectorAll('.catalog-entry'));

    function applyFilters() {
      var text = textInput.value.trim().toLowerCase();
      var category = categorySelect.value;
      var subcategory = subcategorySelect.value;
      var year = yearSelect.value;
      var visible = 0;

      entries.forEach(function (entry) {
        var matchesText = !text || entry.dataset.search.indexOf(text) !== -1;
        var matchesCategory = !category || entry.dataset.category === category;
        var matchesSubcategory = !subcategory || entry.dataset.subcategory === subcategory;
        var matchesYear = !year || entry.dataset.year === year;
        var show = matchesText && matchesCategory && matchesSubcategory && matchesYear;
        entry.style.display = show ? '' : 'none';
        if (show) visible += 1;
      });

      if (!text && !category && !subcategory && !year) {
        status.textContent = '';
      } else if (visible === 0) {
        status.textContent = 'No guides match those filters.';
      } else {
        status.textContent = 'Showing ' + visible + ' of ' + entries.length + ' guides.';
      }
    }

    textInput.addEventListener('input', applyFilters);
    categorySelect.addEventListener('change', applyFilters);
    subcategorySelect.addEventListener('change', applyFilters);
    yearSelect.addEventListener('change', applyFilters);
    resetBtn.addEventListener('click', function () {
      textInput.value = '';
      categorySelect.value = '';
      subcategorySelect.value = '';
      yearSelect.value = '';
      applyFilters();
    });
  })();
</script>
